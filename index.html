<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간 일정표</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>주간 일정표</h1>
      <p class="subtitle">나의 일주일 시간 관리</p>
    </header>

    <nav class="day-tabs">
      <button class="day-tab active" data-day="monday">월</button>
      <button class="day-tab" data-day="tuesday">화</button>
      <button class="day-tab" data-day="wednesday">수</button>
      <button class="day-tab" data-day="thursday">목</button>
      <button class="day-tab" data-day="friday">금</button>
      <button class="day-tab weekend" data-day="saturday">토</button>
      <button class="day-tab weekend" data-day="sunday">일</button>
    </nav>

    <div class="timeline-header">
      <span class="current-day-label">월요일</span>
      <button class="btn-add" id="btnAdd">+ 일정 추가</button>
    </div>

    <div class="timeline" id="timeline">
      <!-- 시간 슬롯은 JS로 생성 -->
    </div>
  </div>

  <!-- 일정 추가/수정 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">일정 추가</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="scheduleForm">
        <div class="form-group">
          <label for="eventTitle">일정 제목</label>
          <input type="text" id="eventTitle" placeholder="예: 팀 미팅" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="startTime">시작 시간</label>
            <select id="startTime"></select>
          </div>
          <div class="form-group">
            <label for="endTime">종료 시간</label>
            <select id="endTime"></select>
          </div>
        </div>
        <div class="form-group">
          <label>색상</label>
          <div class="color-picker" id="colorPicker">
            <button type="button" class="color-option selected" data-color="#4A90D9" style="background:#4A90D9"></button>
            <button type="button" class="color-option" data-color="#E74C3C" style="background:#E74C3C"></button>
            <button type="button" class="color-option" data-color="#2ECC71" style="background:#2ECC71"></button>
            <button type="button" class="color-option" data-color="#F39C12" style="background:#F39C12"></button>
            <button type="button" class="color-option" data-color="#9B59B6" style="background:#9B59B6"></button>
            <button type="button" class="color-option" data-color="#1ABC9C" style="background:#1ABC9C"></button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-delete hidden" id="btnDelete">삭제</button>
          <div class="form-actions-right">
            <button type="button" class="btn btn-cancel" id="btnCancel">취소</button>
            <button type="submit" class="btn btn-save">저장</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
